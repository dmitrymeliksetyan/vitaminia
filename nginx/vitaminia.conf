# nginx-конфиг для Vitaminia — по образцу проверенного medizin.ru
# (nginx/medizin.conf в medizin-live), упрощён под сайт без /assistant, /my
# и раздела «Лекарства» с 301-редиректами.
#
# Временный домен vitaminia.medizin.ru, пока vitaminia.mx не
# зарегистрирован — после регистрации добавить второй server_name/новый
# сертификат и обновить PUBLIC_SITE_URL в scripts/deploy/config.sh +
# src/config/site.ts.
#
# Зависит от структуры деплоя (scripts/deploy/config.sh, deploy.sh):
#   /var/www/vitaminia/current -> releases/<timestamp>/  (symlink, атомарно
#                                                          переключается deploy.sh)
#   /var/www/vitaminia/current/dist/client/               (статика)
#   Node (dist/server/entry.mjs, под PM2) слушает 127.0.0.1:4321.

upstream vitaminia_node {
    server 127.0.0.1:4321;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name vitaminia.medizin.ru;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl ipv6only=on;

    server_name vitaminia.medizin.ru;

    ssl_certificate /etc/letsencrypt/live/vitaminia.medizin.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vitaminia.medizin.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/vitaminia/current/dist/client;
    index index.html;

    client_max_body_size 5m;

    location = /health {
        proxy_pass http://vitaminia_node;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
        add_header Cache-Control "no-store" always;
    }

    location /admin {
        proxy_pass http://vitaminia_node;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 20s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location /auth {
        proxy_pass http://vitaminia_node;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 20s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /api {
        proxy_pass http://vitaminia_node;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        send_timeout 300s;
        proxy_buffering off;
    }

    location /_astro/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /pagefind/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=3600";
    }

    location / {
        try_files $uri $uri/ =404;
    }

    error_page 404 /404.html;

    access_log /var/log/nginx/vitaminia.access.log;
    error_log /var/log/nginx/vitaminia.error.log;
}
